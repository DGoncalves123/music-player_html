<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="triangleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(var(--primary));stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(var(--primary));stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <!-- Equilateral triangle pointing right (play button style) -->
  <path 
    d="M 8 4 L 26 16 L 8 28 Z" 
    fill="url(#triangleGradient)"
    stroke="hsl(var(--primary))"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
</svg>
